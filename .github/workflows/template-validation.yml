name: Template Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'community-templates/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'community-templates/**'

jobs:
  validate-templates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Validate all templates
      run: |
        echo "🔍 Discovering and validating templates in community-templates/"
        
        FAILED=0
        for dir in community-templates/*/; do
          if [ -d "$dir" ]; then
            template=$(basename "$dir")
            echo "--- Validating $template ---"
            
            cd "$dir"
            
            # Check if package.json exists
            if [ ! -f "package.json" ]; then
              echo "❌ $template: package.json not found"
              FAILED=1
            else
              # Validate package.json syntax
              if ! npm install --dry-run > /dev/null 2>&1; then
                echo "❌ $template: Invalid package.json"
                FAILED=1
              else
                echo "✅ $template: package.json is valid"
              fi
            fi

            # Check if README.md exists (warning only)
            if [ ! -f "README.md" ]; then
              echo "⚠️  $template: README.md not found"
            fi
            
            cd ../..
          fi
        done
        
        if [ $FAILED -eq 1 ]; then
          echo "❌ Some templates failed validation"
          exit 1
        fi
        echo "✅ All templates passed validation"

  update-readme:
    runs-on: ubuntu-latest
    needs: validate-templates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Count templates
      id: count
      run: |
        TEMPLATE_COUNT=$(find community-templates -maxdepth 1 -type d | wc -l)
        TEMPLATE_COUNT=$((TEMPLATE_COUNT - 1)) # Subtract 1 for the directory itself
        echo "count=$TEMPLATE_COUNT" >> $GITHUB_OUTPUT

    - name: Update template count in README
      run: |
        # Update the badge in README.md if it exists
        if grep -q "badge/templates-" README.md; then
          sed -i "s/badge\/templates-[0-9]*\+-/badge\/templates-${{ steps.count.outputs.count }}+/" README.md
          echo "Updated template count to ${{ steps.count.outputs.count }} in README.md"
        else
          echo "Template count badge not found in README.md"
        fi

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update template count to ${{ steps.count.outputs.count }}"
        git push origin main || echo "Push failed (expected if no changes or permissions issue)"
