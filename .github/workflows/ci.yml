name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install node modules
        run: npm ci --no-audit --no-fund --progress=false

      - name: Type-checking
        run: npm run ts

      - name: Unit tests
        run: npm run test

  e2e:
    name: E2E Tests (${{ matrix.os.name }} – shard ${{ matrix.shard }}/${{ matrix.shardTotal }})
    # Run E2E only on PRs and when not a draft — avoids burning minutes on every push
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: "windows", image: "windows-latest" }
          - { name: "macos", image: "macos-latest" }
        shard: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ${{ matrix.os.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install node modules
        run: npm ci --no-audit --no-fund --progress=false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ matrix.os.name }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.os.name }}-pnpm-store-

      - name: Install scaffold dependencies
        run: cd scaffold && pnpm install

      - name: Install Chromium for Playwright
        run: npx playwright install chromium --with-deps

      - name: Build for E2E
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run pre:e2e

      - name: Prep fake LLM server
        run: cd testing/fake-llm-server && npm install && npm run build && cd -

      - name: E2E tests (shard ${{ matrix.shard }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.shardTotal }}

      - name: Upload shard results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.os.name }}-shard-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  merge-reports:
    name: Merge E2E Reports
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs: [e2e]
    permissions:
      contents: read
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --progress=false

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: PLAYWRIGHT_HTML_OUTPUT_DIR=playwright-report npx playwright merge-reports --config=merge.config.ts ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 3
